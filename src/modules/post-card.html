<div
  th:fragment="post-card(post,cover,animation,border,direction)"
  class="group relative flex flex-col overflow-hidden rounded-2xl bg-white/80 transition-all duration-500 hover:shadow-[0_20px_50px_-15px_rgba(59,130,246,0.15)] dark:bg-slate-800/80 backdrop-blur-sm border border-gray-100/50 dark:border-slate-700/50"
  th:classappend="${animation  ? 'hover:-translate-y-1.5' : ''} + ' ' + ${border ? 'hover:border-blue-500/50' : ''} + ' ' + ${direction == 'column' ? '!grid grid-cols-1 sm:grid-cols-5' : ''}"
>
  <!-- Hover border glow effect -->
  <div class="absolute inset-0 z-0 opacity-0 transition-opacity duration-500 group-hover:opacity-100 pointer-events-none">
    <div class="absolute inset-0 bg-gradient-to-tr from-blue-500/5 via-transparent to-blue-500/5"></div>
  </div>

  <!-- Badges Container (Top-right) -->
  <div class="absolute right-0 top-0 z-30 flex flex-row-reverse items-start gap-2">
    <!-- Pinned Marker -->
    <div th:if="${post.spec.pinned}" class="relative overflow-hidden" th:title="#{fragment.postCard.pinned}">
      <!-- Main badge -->
      <div class="flex items-center gap-1.5 rounded-bl-2xl bg-gradient-to-br from-blue-600 to-blue-700 px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] text-white shadow-[0_4px_15px_-3px_rgba(37,99,235,0.6)] backdrop-blur-sm">
        <span class="i-tabler-pin-filled size-3.5 animate-bounce"></span>
        <span th:text="#{fragment.postCard.pinned}">置顶</span>
      </div>
      <!-- Decorative light sweep -->
      <div class="absolute inset-0 -translate-x-full animate-[shimmer_2s_infinite] bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>
      <!-- Corner pulse light -->
      <div class="absolute right-1 top-1 size-1.5 rounded-full bg-blue-300 shadow-[0_0_8px_rgba(147,197,253,0.8)]"></div>
    </div>

    <!-- Original/Reprint Badge -->
    <div class="relative overflow-hidden">
      <!-- Original Badge (Default if null or not 'false') -->
      <div th:if="${post.metadata.annotations['content.halo.run/original'] != 'false'}" class="flex items-center gap-1 rounded-bl-2xl bg-gradient-to-br from-cyan-500/90 to-blue-600/90 px-3 py-2 text-[10px] font-bold uppercase tracking-wider text-white shadow-[-4px_4px_12px_-2px_rgba(6,182,212,0.4)] backdrop-blur-md">
        <span class="i-tabler-certificate size-3.5"></span>
        <span th:text="#{fragment.postCard.original}">原创</span>
      </div>
      <!-- Reprint Badge (Only if explicitly 'false') -->
      <div th:if="${post.metadata.annotations['content.halo.run/original'] == 'false'}" class="flex items-center gap-1 rounded-bl-2xl bg-gradient-to-br from-orange-500/90 to-red-600/90 px-3 py-2 text-[10px] font-bold uppercase tracking-wider text-white shadow-[-4px_4px_12px_-2px_rgba(249,115,22,0.4)] backdrop-blur-md">
        <span class="i-tabler-repeat size-3.5"></span>
        <span th:text="#{fragment.postCard.reprint}">转载</span>
      </div>
      <!-- Decorative shimmer -->
      <div class="absolute inset-0 -translate-x-full animate-[shimmer_3s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
    </div>
  </div>

  <div
    th:if="${cover} and ${not #strings.isEmpty(post.spec.cover)}"
    class="relative z-10 aspect-h-9 aspect-w-16 overflow-hidden"
    th:classappend="${direction == 'column' ? 'col-span-2' : ''}"
  >
    <a th:href="@{${post.status.permalink}}" th:title="${post.spec.title}">
      <img
        th:src="${post.spec.cover}"
        th:alt="${post.spec.title}"
        th:srcset="|${thumbnail.gen(post.spec.cover, 's')} 400w,
                    ${thumbnail.gen(post.spec.cover, 'm')} 800w,
                    ${thumbnail.gen(post.spec.cover, 'l')} 1200w|"
        sizes="(max-width: 1200px) 100vw, 1200px"
        class="size-full object-cover transition-all duration-500"
        th:classappend="${animation} ? 'group-hover:scale-105'"
      />
    </a>
  </div>
  <div
    class="relative col-span-3 grid h-full grid-cols-1 content-between gap-2 p-4"
    th:with="list_layout=${theme.config.layout.post_list_layout}"
    th:classappend="${#strings.isEmpty(post.spec.cover) ? 'col-span-5' : ''}"
  >
    <div class="space-y-2">
      <div
        th:if="${not #lists.isEmpty(post.categories)} or ${not #lists.isEmpty(post.tags)}"
        class="flex flex-wrap items-center gap-2"
      >
        <a
          th:if="${#lists.size(post.categories)} gt 0"
          th:href="@{${post.categories[0].status.permalink}}"
          th:title="${post.categories[0].spec.displayName}"
          th:text="${post.categories[0].spec.displayName}"
          class="mr-1 text-sm font-medium text-gray-800 hover:text-gray-900 dark:text-slate-500 dark:hover:text-slate-600"
        >
        </a>
        <a
          th:each="tag : ${post.tags}"
          th:href="@{${tag.status.permalink}}"
          th:title="${tag.spec.displayName}"
          th:text="|#${tag.spec.displayName}|"
          class="cursor-pointer text-sm italic text-gray-600 hover:text-gray-900 dark:text-slate-400 dark:hover:text-slate-500"
        >
        </a>
      </div>
      <h1
        class="line-clamp-2 cursor-pointer text-2xl font-medium transition-all hover:text-gray-500 hover:underline dark:text-slate-50 dark:hover:text-white"
        th:classappend="|${direction == 'column' ? 'sm:line-clamp-2' : ''} ${list_layout == 'grid_2' ? 'sm:line-clamp-3' : ''} ${list_layout == 'grid_3' ? 'sm:line-clamp-4' : ''}|"
      >
        <a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}" th:title="${post.spec.title}"></a>
      </h1>
      <p
        class="font-sm line-clamp-2 font-light dark:text-slate-200"
        th:text="${post.status.excerpt}"
        th:classappend="${list_layout == 'grid_3' ? 'sm:line-clamp-3' : ''}"
      ></p>
    </div>
    <div class="mt-4 flex items-center justify-start gap-2">
      <a th:href="@{${post.owner.permalink}}" th:title="${post.owner.displayName}">
        <img
          th:src="${post.owner.avatar ?: #theme.assets('/images/default-avatar.svg')}"
          th:title="${post.owner.displayName}"
          th:alt="${post.owner.displayName}"
          class="size-8 rounded-full border drop-shadow-sm dark:border-slate-700"
        />
      </a>
      <a
        th:href="@{${post.owner.permalink}}"
        th:title="${post.owner.displayName}"
        class="text-sm font-medium text-gray-900 hover:text-gray-600 dark:text-slate-100 dark:hover:text-slate-200"
        th:if="${#strings.isEmpty(post.owner.avatar)}"
        th:text="${post.owner.displayName}"
      ></a>
      <span
        class="text-sm tabular-nums text-gray-600 dark:text-slate-300"
        th:text="#{common.publishedOn(${#dates.format(post.spec.publishTime,'yyyy-MM-dd')})}"
      >
      </span>
    </div>
  </div>
</div>
