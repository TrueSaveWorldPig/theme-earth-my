<ul id="filters" class="flex flex-wrap gap-3 p-1">
  <li>
    <a
      href="/"
      class="relative inline-flex h-9 cursor-pointer items-center overflow-hidden rounded-lg px-4 font-medium text-gray-500 transition-all duration-300 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400 group"
      th:classappend="${_templateId == 'index'} ? '!text-blue-600 bg-blue-50/50 dark:bg-blue-900/20 dark:!text-blue-400 shadow-[0_0_15px_-3px_rgba(59,130,246,0.3)]' : 'bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm border border-gray-200/50 dark:border-slate-700/50'"
    >
      <span class="relative z-10 truncate text-sm uppercase tracking-wider" th:text="#{common.all}"> </span>
      <div th:if="${_templateId == 'index'}" class="absolute bottom-0 left-0 h-0.5 w-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
    </a>
  </li>
  <th:block th:with="categories = ${categoryFinder.listAsTree()}">
    <li
      x-data="dropdown"
      @mouseenter="open()"
      @mouseleave="close()"
      class="relative cursor-pointer transition-all"
      th:each="categoryItem,categoryStat : ${categories}"
    >
      <div
        class="group inline-flex h-9 cursor-pointer items-center gap-1 overflow-hidden rounded-lg font-medium text-gray-500 transition-all duration-300 hover:text-blue-600 dark:text-slate-400 dark:hover:text-blue-400"
        th:classappend="(${category} and ${category.metadata.name == categoryItem.metadata.name}) or (not ${category} and ${categoryStat.index == 0} and ${_templateId == 'categories'}) ? '!text-blue-600 bg-blue-50/50 dark:bg-blue-900/20 dark:!text-blue-400 shadow-[0_0_15px_-3px_rgba(59,130,246,0.3)] border-blue-200/50 dark:border-blue-800/50' : 'bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm border border-gray-200/50 dark:border-slate-700/50'"
      >
        <a
          class="relative z-10 truncate px-4 text-sm uppercase tracking-wider"
          th:href="@{${categoryItem.status.permalink}}"
          th:text="${categoryItem.spec.displayName}"
          th:classappend="${#lists.isEmpty(categoryItem.children) ? '' : '!pr-1'}"
        >
        </a>
        <button
          th:if="${not #lists.isEmpty(categoryItem.children)}"
          @click="open()"
          class="h-full px-2 text-lg transition-colors group-hover:bg-blue-100/50 dark:group-hover:bg-blue-900/30"
        >
          <span
            class="i-tabler-chevron-right block transition-all duration-300"
            x-bind:class="show ? 'rotate-90 text-blue-500' : ''"
          ></span>
        </button>
        <div th:if="(${category} and ${category.metadata.name == categoryItem.metadata.name}) or (not ${category} and ${categoryStat.index == 0} and ${_templateId == 'categories'})" class="absolute bottom-0 left-0 h-0.5 w-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
      </div>

      <ul
        th:if="${not #lists.isEmpty(categoryItem.children)}"
        @mouseenter="open()"
        @mouseleave="close()"
        x-show="show"
        x-cloak
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="transform opacity-0 -translate-y-2"
        x-transition:enter-end="transform opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="transform opacity-100 translate-y-0"
        x-transition:leave-end="transform opacity-0 -translate-y-2"
        class="absolute left-0 z-10 mt-2 w-60 overflow-hidden rounded-xl bg-white/90 p-2 shadow-xl backdrop-blur-md border border-gray-100 dark:border-slate-700 dark:bg-slate-800/90"
      >
        <li th:replace="~{modules/category-tree :: single(categories=${categoryItem.children})}" />
      </ul>
    </li>
  </th:block>
</ul>
