<ul th:fragment="next (categories)" class="my-3 ml-4 space-y-1.5 border-l-2 border-blue-500/10 pl-3 dark:border-blue-400/10">
  <li th:fragment="single (categories)" th:each="category : ${categories}">
    <a
      th:href="@{${category.status.permalink}}"
      th:title="${category.spec.displayName}"
      class="group/item flex items-center justify-between rounded-lg px-2.5 py-1.5 transition-all duration-300 hover:bg-blue-500/5 dark:hover:bg-blue-400/5"
    >
      <div class="flex items-center gap-2">
        <span class="i-tabler-folder-open size-3.5 text-blue-500/60 transition-transform duration-300 group-hover/item:rotate-12 group-hover/item:text-blue-500"></span>
        <span class="text-[13px] font-medium text-gray-700 transition-colors group-hover/item:text-blue-600 dark:text-slate-300 dark:group-hover/item:text-blue-400" th:text="${category.spec.displayName}"> </span>
      </div>
      <span
        class="rounded-md bg-blue-500/5 px-1.5 py-0.5 font-mono text-[10px] font-bold text-blue-600 opacity-80 transition-all group-hover/item:bg-blue-500 group-hover/item:text-white dark:bg-blue-400/10 dark:text-blue-400"
        th:text="${category.postCount ?: 0}"
      >
      </span>
    </a>
    <th:block th:if="${not #lists.isEmpty(category.children)}">
      <th:block th:replace="~{modules/category-tree :: next (categories=${category.children})}"></th:block>
    </th:block>
  </li>
</ul>
