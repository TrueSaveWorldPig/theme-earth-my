<div
  class="group group/widget relative w-full overflow-hidden rounded-2xl border border-gray-200/50 bg-white/70 p-6 shadow-sm backdrop-blur-md transition-all duration-500 hover:border-blue-500/30 hover:shadow-[0_0_20px_-5px_rgba(59,130,246,0.2)] dark:border-slate-700/50 dark:bg-slate-900/70"
  th:with="stats = ${siteStatsFinder.getStats()}"
>
  <!-- Decorative background tech circles -->
  <div class="absolute -right-10 -top-10 size-32 rounded-full bg-blue-500/5 blur-3xl group-hover:bg-blue-500/10 transition-all duration-500"></div>
  
  <div class="relative z-10 flex flex-col items-center justify-center gap-5">
    <div th:unless="${#strings.isEmpty(options.logo)}" class="relative">
      <div class="absolute inset-0 animate-pulse rounded-full bg-blue-500/20 blur-md"></div>
      <img
        th:src="${options.logo}"
        th:alt="${site.title}"
        width="96"
        height="96"
        class="relative size-24 rounded-full object-cover border-2 border-white/50 dark:border-slate-700/50 shadow-lg"
      />
    </div>
    <div class="text-center">
      <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-slate-50" th:text="${site.title}"></h1>
      <p th:unless="${#strings.isEmpty(site.subtitle)}" class="mt-1 text-xs text-gray-500 dark:text-slate-400 font-medium" th:text="${site.subtitle}"></p>
    </div>
    
    <div class="grid w-full grid-cols-4 gap-2 rounded-xl bg-blue-50/30 p-3 dark:bg-blue-900/10 border border-blue-100/30 dark:border-blue-800/20">
      <div class="flex flex-col items-center">
        <span class="text-sm font-bold tabular-nums text-blue-600 dark:text-blue-400">
          <number-formatter th:attr="value=${stats.post}" />
        </span>
        <span class="text-[10px] font-medium uppercase tracking-tighter text-gray-400 dark:text-slate-500" th:text="#{widget.profile.postCount.label}"></span>
      </div>
      <div class="flex flex-col items-center">
        <span class="text-sm font-bold tabular-nums text-blue-600 dark:text-blue-400">
          <number-formatter th:attr="value=${stats.category}" />
        </span>
        <span class="text-[10px] font-medium uppercase tracking-tighter text-gray-400 dark:text-slate-500" th:text="#{widget.profile.categoryCount.label}"></span>
      </div>
      <div class="flex flex-col items-center">
        <span class="text-sm font-bold tabular-nums text-blue-600 dark:text-blue-400">
          <number-formatter th:attr="value=${stats.comment}" />
        </span>
        <span class="text-[10px] font-medium uppercase tracking-tighter text-gray-400 dark:text-slate-500" th:text="#{widget.profile.commentCount.label}"></span>
      </div>
      <div class="flex flex-col items-center">
        <span class="text-sm font-bold tabular-nums text-blue-600 dark:text-blue-400">
          <number-formatter th:attr="value=${stats.visit}" />
        </span>
        <span class="text-[10px] font-medium uppercase tracking-tighter text-gray-400 dark:text-slate-500" th:text="#{widget.profile.visitCount.label}"></span>
      </div>
    </div>
    
    <div class="flex flex-wrap items-center justify-center gap-3">
      <th:block th:each="social_media : ${options.social_media}">
        <a
          th:if="${social_media.url_type == 'normal'}"
          th:aria-label="${social_media.name}"
          class="flex size-8 items-center justify-center rounded-lg bg-white/50 dark:bg-slate-700/50 text-gray-500 hover:text-blue-500 hover:bg-white dark:hover:bg-slate-700 transition-all duration-300 shadow-sm [&>svg]:size-4"
          th:href="${social_media.url}"
          target="_blank"
        >
          <th:block th:utext="${social_media.icon.value}" />
        </a>

        <span
          th:if="${social_media.url_type == 'image'}"
          th:attr="x-data=|{openImageModal:false,image: '${social_media.url}', alt: '${social_media.name}'}|"
          class="flex size-8 items-center justify-center rounded-lg bg-white/50 dark:bg-slate-700/50 text-gray-500 hover:text-blue-500 hover:bg-white dark:hover:bg-slate-700 transition-all duration-300 shadow-sm cursor-pointer [&>svg]:size-4"
          @click="openImageModal = true"
        >
          <th:block th:utext="${social_media.icon.value}" />
          <th:block th:replace="~{modules/image-view-modal}" />
        </span>
      </th:block>
    </div>
  </div>
</div>
