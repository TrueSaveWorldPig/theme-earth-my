<div
  class="group/widget w-full overflow-hidden rounded-2xl border border-gray-200/50 bg-white/70 p-4 shadow-sm backdrop-blur-md transition-all duration-500 hover:border-blue-500/30 hover:shadow-[0_0_20px_-5px_rgba(59,130,246,0.2)] dark:border-slate-700/50 dark:bg-slate-900/70"
>
  <div class="mb-4 flex items-center justify-between">
    <h2 class="flex items-center gap-2 text-sm font-bold tracking-wider text-gray-800 dark:text-slate-200">
      <div class="relative">
        <span class="i-tabler-quote relative z-10 size-5 text-blue-600 dark:text-blue-400"></span>
        <div class="absolute inset-0 animate-pulse bg-blue-400/20 blur-sm"></div>
      </div>
      <span>每日一言</span>
    </h2>
    <div class="flex gap-1">
      <span class="size-1 rounded-full bg-blue-400/40"></span>
      <span class="size-1 rounded-full bg-blue-400/60"></span>
      <span class="size-1 animate-pulse rounded-full bg-blue-500"></span>
    </div>
  </div>

  <div x-data="{ 
    quote: '加载中...', 
    from: '', 
    async fetchQuote() {
      try {
        const response = await fetch('https://v1.hitokoto.cn');
        const data = await response.json();
        this.quote = data.hitokoto;
        this.from = '—— ' + (data.from_who || '') + ' 「' + data.from + '」';
      } catch (e) {
        this.quote = '生命不息，奋斗不止。';
        this.from = '—— 佚名';
      }
    } 
  }" x-init="fetchQuote()">
    <p class="text-sm leading-relaxed text-gray-700 dark:text-slate-200 font-medium" x-text="quote"></p>
    <p class="mt-3 text-right text-xs text-gray-400 dark:text-slate-500 italic" x-text="from"></p>
  </div>
</div>
