<div
  data-widget="latest-comments"
  class="group relative w-full overflow-hidden rounded-2xl bg-white/80 p-5 backdrop-blur-md transition-all duration-500 hover:shadow-[0_20px_50px_-15px_rgba(59,130,246,0.15)] dark:bg-slate-800/80 border border-gray-100/50 dark:border-slate-700/50"
>
  <div class="mb-4 flex items-center gap-2">
    <div class="flex size-8 items-center justify-center rounded-lg bg-blue-500/10 text-blue-500 shadow-sm">
      <span class="i-tabler-message-circle text-lg"></span>
    </div>
    <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500 dark:text-slate-400" th:text="#{widget.latestComments.title}">最新评论</h2>
  </div>

  <div th:with="comments = ${commentFinder.list(null, 1, 5)}">
    <ul th:if="${not #lists.isEmpty(comments)}" role="list" class="space-y-4">
      <li th:each="comment : ${comments}" class="group/item relative">
        <div class="flex items-start space-x-3">
          <div class="relative flex-shrink-0">
            <img class="size-8 rounded-full border border-gray-100 dark:border-slate-700 shadow-sm transition-transform duration-300 group-hover/item:scale-110"
                 th:attr="data-cravatar-email=${comment.spec.owner.name ?: ''}"
                 th:src="${#theme.assets('/images/default-avatar.svg')}"
                 th:alt="${comment.spec.owner.displayName}" />
            <div class="absolute -bottom-0.5 -right-0.5 size-2.5 rounded-full border-2 border-white bg-green-500 dark:border-slate-800"></div>
          </div>
          <div class="min-w-0 flex-1">
            <div class="flex items-center justify-between gap-2">
              <h3 class="truncate text-xs font-bold text-gray-900 dark:text-slate-100" th:text="${comment.spec.owner.displayName}"></h3>
              <span class="flex-shrink-0 text-[10px] text-gray-400 dark:text-slate-500" th:text="${#dates.format(comment.metadata.creationTimestamp,'MM-dd')}"></span>
            </div>
            <p class="mt-1 line-clamp-2 text-xs leading-relaxed text-gray-500 dark:text-slate-400" th:text="${comment.spec.content}"></p>
          </div>
        </div>
        <!-- Decorative line -->
        <div class="absolute -left-1.5 top-0 h-full w-0.5 scale-y-0 bg-blue-500 transition-transform duration-300 group-hover/item:scale-y-100"></div>
      </li>
    </ul>
    
    <div th:if="${#lists.isEmpty(comments)}" class="py-6 text-center">
      <span class="text-xs text-gray-400 dark:text-slate-500 italic">暂无评论...</span>
    </div>
  </div>
</div>

<script>
  (() => {
    const script = document.currentScript;
    const root = script ? script.closest('[data-widget="latest-comments"]') : null;
    if (!root) return;

    const rotateLeft = (value, shift) => (value << shift) | (value >>> (32 - shift));
    const addUnsigned = (a, b) => {
      const a8 = a & 0x80000000;
      const b8 = b & 0x80000000;
      const a4 = a & 0x40000000;
      const b4 = b & 0x40000000;
      const result = (a & 0x3fffffff) + (b & 0x3fffffff);
      if (a4 & b4) return result ^ 0x80000000 ^ a8 ^ b8;
      if (a4 | b4) return result & 0x40000000 ? result ^ 0xc0000000 ^ a8 ^ b8 : result ^ 0x40000000 ^ a8 ^ b8;
      return result ^ a8 ^ b8;
    };

    const f = (x, y, z) => (x & y) | (~x & z);
    const g = (x, y, z) => (x & z) | (y & ~z);
    const h = (x, y, z) => x ^ y ^ z;
    const i = (x, y, z) => y ^ (x | ~z);

    const ff = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, f(b, c, d)), addUnsigned(x, ac)), s), b);
    const gg = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, g(b, c, d)), addUnsigned(x, ac)), s), b);
    const hh = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, h(b, c, d)), addUnsigned(x, ac)), s), b);
    const ii = (a, b, c, d, x, s, ac) => addUnsigned(rotateLeft(addUnsigned(addUnsigned(a, i(b, c, d)), addUnsigned(x, ac)), s), b);

    const utf8Encode = (str) => unescape(encodeURIComponent(str));

    const toWordArray = (str) => {
      const wordArray = [];
      const byteCount = str.length;
      let wordCount = 0;
      for (let bytePosition = 0; bytePosition < byteCount; bytePosition++) {
        wordCount = (bytePosition - (bytePosition % 4)) / 4;
        wordArray[wordCount] = wordArray[wordCount] ?? 0;
        wordArray[wordCount] |= str.charCodeAt(bytePosition) << ((bytePosition % 4) * 8);
      }
      wordCount = (byteCount - (byteCount % 4)) / 4;
      wordArray[wordCount] = wordArray[wordCount] ?? 0;
      wordArray[wordCount] |= 0x80 << ((byteCount % 4) * 8);
      wordArray[(((byteCount + 8) >>> 6) << 4) + 14] = byteCount << 3;
      wordArray[(((byteCount + 8) >>> 6) << 4) + 15] = byteCount >>> 29;
      return wordArray;
    };

    const wordToHex = (value) => {
      let hex = "";
      for (let count = 0; count <= 3; count++) {
        const byte = (value >>> (count * 8)) & 255;
        hex += (`0${byte.toString(16)}`).slice(-2);
      }
      return hex;
    };

    const md5 = (input) => {
      const x = toWordArray(utf8Encode(input));
      let a = 0x67452301;
      let b = 0xefcdab89;
      let c = 0x98badcfe;
      let d = 0x10325476;

      for (let k = 0; k < x.length; k += 16) {
        const aa = a;
        const bb = b;
        const cc = c;
        const dd = d;

        a = ff(a, b, c, d, x[k + 0], 7, 0xd76aa478);
        d = ff(d, a, b, c, x[k + 1], 12, 0xe8c7b756);
        c = ff(c, d, a, b, x[k + 2], 17, 0x242070db);
        b = ff(b, c, d, a, x[k + 3], 22, 0xc1bdceee);
        a = ff(a, b, c, d, x[k + 4], 7, 0xf57c0faf);
        d = ff(d, a, b, c, x[k + 5], 12, 0x4787c62a);
        c = ff(c, d, a, b, x[k + 6], 17, 0xa8304613);
        b = ff(b, c, d, a, x[k + 7], 22, 0xfd469501);
        a = ff(a, b, c, d, x[k + 8], 7, 0x698098d8);
        d = ff(d, a, b, c, x[k + 9], 12, 0x8b44f7af);
        c = ff(c, d, a, b, x[k + 10], 17, 0xffff5bb1);
        b = ff(b, c, d, a, x[k + 11], 22, 0x895cd7be);
        a = ff(a, b, c, d, x[k + 12], 7, 0x6b901122);
        d = ff(d, a, b, c, x[k + 13], 12, 0xfd987193);
        c = ff(c, d, a, b, x[k + 14], 17, 0xa679438e);
        b = ff(b, c, d, a, x[k + 15], 22, 0x49b40821);

        a = gg(a, b, c, d, x[k + 1], 5, 0xf61e2562);
        d = gg(d, a, b, c, x[k + 6], 9, 0xc040b340);
        c = gg(c, d, a, b, x[k + 11], 14, 0x265e5a51);
        b = gg(b, c, d, a, x[k + 0], 20, 0xe9b6c7aa);
        a = gg(a, b, c, d, x[k + 5], 5, 0xd62f105d);
        d = gg(d, a, b, c, x[k + 10], 9, 0x02441453);
        c = gg(c, d, a, b, x[k + 15], 14, 0xd8a1e681);
        b = gg(b, c, d, a, x[k + 4], 20, 0xe7d3fbc8);
        a = gg(a, b, c, d, x[k + 9], 5, 0x21e1cde6);
        d = gg(d, a, b, c, x[k + 14], 9, 0xc33707d6);
        c = gg(c, d, a, b, x[k + 3], 14, 0xf4d50d87);
        b = gg(b, c, d, a, x[k + 8], 20, 0x455a14ed);
        a = gg(a, b, c, d, x[k + 13], 5, 0xa9e3e905);
        d = gg(d, a, b, c, x[k + 2], 9, 0xfcefa3f8);
        c = gg(c, d, a, b, x[k + 7], 14, 0x676f02d9);
        b = gg(b, c, d, a, x[k + 12], 20, 0x8d2a4c8a);

        a = hh(a, b, c, d, x[k + 5], 4, 0xfffa3942);
        d = hh(d, a, b, c, x[k + 8], 11, 0x8771f681);
        c = hh(c, d, a, b, x[k + 11], 16, 0x6d9d6122);
        b = hh(b, c, d, a, x[k + 14], 23, 0xfde5380c);
        a = hh(a, b, c, d, x[k + 1], 4, 0xa4beea44);
        d = hh(d, a, b, c, x[k + 4], 11, 0x4bdecfa9);
        c = hh(c, d, a, b, x[k + 7], 16, 0xf6bb4b60);
        b = hh(b, c, d, a, x[k + 10], 23, 0xbebfbc70);
        a = hh(a, b, c, d, x[k + 13], 4, 0x289b7ec6);
        d = hh(d, a, b, c, x[k + 0], 11, 0xeaa127fa);
        c = hh(c, d, a, b, x[k + 3], 16, 0xd4ef3085);
        b = hh(b, c, d, a, x[k + 6], 23, 0x04881d05);
        a = hh(a, b, c, d, x[k + 9], 4, 0xd9d4d039);
        d = hh(d, a, b, c, x[k + 12], 11, 0xe6db99e5);
        c = hh(c, d, a, b, x[k + 15], 16, 0x1fa27cf8);
        b = hh(b, c, d, a, x[k + 2], 23, 0xc4ac5665);

        a = ii(a, b, c, d, x[k + 0], 6, 0xf4292244);
        d = ii(d, a, b, c, x[k + 7], 10, 0x432aff97);
        c = ii(c, d, a, b, x[k + 14], 15, 0xab9423a7);
        b = ii(b, c, d, a, x[k + 5], 21, 0xfc93a039);
        a = ii(a, b, c, d, x[k + 12], 6, 0x655b59c3);
        d = ii(d, a, b, c, x[k + 3], 10, 0x8f0ccc92);
        c = ii(c, d, a, b, x[k + 10], 15, 0xffeff47d);
        b = ii(b, c, d, a, x[k + 1], 21, 0x85845dd1);
        a = ii(a, b, c, d, x[k + 8], 6, 0x6fa87e4f);
        d = ii(d, a, b, c, x[k + 15], 10, 0xfe2ce6e0);
        c = ii(c, d, a, b, x[k + 6], 15, 0xa3014314);
        b = ii(b, c, d, a, x[k + 13], 21, 0x4e0811a1);
        a = ii(a, b, c, d, x[k + 4], 6, 0xf7537e82);
        d = ii(d, a, b, c, x[k + 11], 10, 0xbd3af235);
        c = ii(c, d, a, b, x[k + 2], 15, 0x2ad7d2bb);
        b = ii(b, c, d, a, x[k + 9], 21, 0xeb86d391);

        a = addUnsigned(a, aa);
        b = addUnsigned(b, bb);
        c = addUnsigned(c, cc);
        d = addUnsigned(d, dd);
      }

      return (wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d)).toLowerCase();
    };

    const extractEmail = (value) => {
      const normalized = String(value || "").trim();
      const match = normalized.match(/[^\s<>"']+@[^\s<>"']+/);
      return match ? match[0] : null;
    };

    const getCravatarUrl = (email) => {
      const normalizedEmail = String(email).trim().toLowerCase();
      return `https://cn.cravatar.com/avatar/${md5(normalizedEmail)}`;
    };

    const apply = (scope) => {
      const images = scope.querySelectorAll ? scope.querySelectorAll('img[data-cravatar-email]') : [];
      images.forEach((img) => {
        if (img.dataset && img.dataset.cravatarApplied === "1") return;
        const raw = img.getAttribute("data-cravatar-email");
        if (!raw) return;
        const email = extractEmail(raw);
        if (!email) return;
        img.src = getCravatarUrl(email);
        if (img.dataset) img.dataset.cravatarApplied = "1";
      });
    };

    apply(root);

    const observer = new MutationObserver((mutations) => {
      mutations.forEach((m) => {
        m.addedNodes.forEach((node) => {
          if (node && (node.nodeType === 1 || node.nodeType === 11)) apply(node);
        });
      });
    });
    observer.observe(root, { childList: true, subtree: true });
  })();
</script>
