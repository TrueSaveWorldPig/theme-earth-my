<div
  class="group/widget w-full overflow-hidden rounded-2xl border border-gray-200/50 bg-white/70 p-4 shadow-sm backdrop-blur-md transition-all duration-500 hover:border-blue-500/30 hover:shadow-[0_0_20px_-5px_rgba(59,130,246,0.2)] dark:border-slate-700/50 dark:bg-slate-900/70"
>
  <div class="mb-4 flex items-center justify-between">
    <h2 class="flex items-center gap-2 text-sm font-bold tracking-wider text-gray-800 dark:text-slate-200">
      <div class="relative">
        <span class="i-tabler-tags relative z-10 size-5 text-blue-600 dark:text-blue-400"></span>
        <div class="absolute inset-0 animate-pulse bg-blue-400/20 blur-sm"></div>
      </div>
      <th:block th:text="#{widget.tags.title}"></th:block>
    </h2>
    <a
      class="group/more inline-flex items-center gap-1 text-[11px] font-bold uppercase tracking-widest text-blue-600/60 transition-all hover:text-blue-600 dark:text-blue-400/60 dark:hover:text-blue-400"
      th:href="@{/tags}"
    >
      <span th:text="#{common.more}"></span>
      <span class="i-tabler-chevron-right size-3.5 transition-transform group-hover/more:translate-x-0.5"></span>
    </a>
  </div>

  <div class="mt-2 flex flex-wrap gap-2" th:with="tags = ${tagFinder.list(1,30)}">
    <a
      th:each="tag : ${tags.items}"
      th:href="@{${tag.status.permalink}}"
      th:title="${tag.spec.displayName}"
      class="group/tag relative flex items-center gap-1.5 overflow-hidden rounded-lg border border-blue-500/10 bg-blue-500/5 px-2.5 py-1.5 transition-all duration-300 hover:border-blue-500/30 hover:bg-blue-500/10 hover:shadow-[0_0_10px_-2px_rgba(59,130,246,0.2)] dark:border-blue-400/10 dark:bg-blue-400/5 dark:hover:border-blue-400/30"
    >
      <span class="text-[12px] font-medium text-gray-700 transition-colors group-hover/tag:text-blue-600 dark:text-slate-300 dark:group-hover/tag:text-blue-400" th:text="${tag.spec.displayName}"></span>
      <span class="font-mono text-[10px] font-bold text-blue-500/50 group-hover/tag:text-blue-500 dark:text-blue-400/50 dark:group-hover/tag:text-blue-400" th:text="${tag.postCount ?: 0}"></span>
      
      <!-- Hover decoration -->
      <div class="absolute bottom-0 left-0 h-0.5 w-0 bg-blue-500 transition-all duration-300 group-hover/tag:w-full"></div>
    </a>
  </div>
</div>
