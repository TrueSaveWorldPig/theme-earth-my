<include src="layout.html">
  <template name="head">
    <title th:text="|${title ?: #messages.msg('page.moments.title')} - ${site.title}|"></title>
    <script type="module" src="@/assets/moment.ts"></script>
  </template>
  <template name="hero">
    <th:block th:replace="~{modules/hero :: hero(isHome = true, cover = null, title = null)}" />
  </template>
  <section class="mx-auto mt-6 grid max-w-7xl grid-cols-1 gap-6 px-4 md:grid-cols-[1fr_18rem] lg:px-6">
    <div class="z-0 min-w-0">
      <div class="rounded-2xl border border-white/20 bg-white/40 p-6 backdrop-blur-xl dark:border-slate-700/20 dark:bg-slate-800/40">
        <h1
          class="mb-9 bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-3xl font-bold text-transparent dark:from-slate-50 dark:to-slate-400"
          th:text="${title ?: #messages.msg('page.moments.title')}"
        ></h1>
        <div class="mb-10">
          <nav class="flex flex-wrap gap-3" aria-label="Tabs">
            <a
              th:href="@{/moments}"
              class="rounded-full border border-gray-200 bg-white/50 px-4 py-1.5 text-sm font-medium text-gray-700 transition-all hover:border-blue-500/30 hover:bg-blue-50/50 hover:text-blue-600 dark:border-slate-700 dark:bg-slate-800/50 dark:text-slate-300 dark:hover:border-blue-400/30 dark:hover:bg-blue-900/20 dark:hover:text-blue-400"
              th:classappend="${#lists.isEmpty(param.tag) ? '!border-blue-500 !bg-blue-50/50 !text-blue-600 dark:!border-blue-400 dark:!bg-blue-900/30 dark:!text-blue-400 shadow-sm shadow-blue-500/20' : ''}"
            >
              <span th:text="#{common.all}"></span>
            </a>
            <a
              th:each="tag : ${tags}"
              th:href="@{|?tag=${tag.name}|}"
              class="flex items-center gap-1.5 rounded-full border border-gray-200 bg-white/50 px-4 py-1.5 text-sm font-medium text-gray-700 transition-all hover:border-blue-500/30 hover:bg-blue-50/50 hover:text-blue-600 dark:border-slate-700 dark:bg-slate-800/50 dark:text-slate-300 dark:hover:border-blue-400/30 dark:hover:bg-blue-900/20 dark:hover:text-blue-400"
              th:classappend="${#lists.contains(param.tag, tag.name) ? '!border-blue-500 !bg-blue-50/50 !text-blue-600 dark:!border-blue-400 dark:!bg-blue-900/30 dark:!text-blue-400 shadow-sm shadow-blue-500/20' : ''}"
            >
              <span th:text="|#${tag.name}|"></span>
              <sup class="text-[10px] opacity-60" th:text="${tag.momentCount}"></sup>
            </a>
          </nav>
        </div>
        <div>
          <ul
            role="list"
            class="space-y-6"
            x-data="upvote('moment','moment.halo.run','moments')"
          >
            <li
                th:id="${moment.metadata.name}"
                th:each="moment : ${moments.items}"
                th:attr="x-data=|{name: '${moment.metadata.name}', showComment: false, releaseTime: '${#dates.format(moment.spec.releaseTime, 'yyyy-MM-dd''T''HH:mm:ss')}'}|"
                th:with="content=${moment.spec.content}"
                class="animated fadeIn moment-item flex w-full items-start gap-4"
              >
              <div class="moment-avatar-container shrink-0">
                <img
                  th:src="${moment.owner.avatar ?: #theme.assets('/images/default-avatar.svg')}"
                  th:title="${moment.owner.displayName}"
                  th:alt="${moment.owner.displayName}"
                  class="size-12 rounded-full"
                />
              </div>
              <div class="min-w-0 flex-1">
                <div class="mb-2 flex items-center justify-between">
                  <span class="text-sm font-semibold text-gray-900 dark:text-slate-100" th:text="${moment.owner.displayName}"></span>
                  <div class="flex items-center text-xs text-gray-400 dark:text-slate-500">
                    <i class="i-tabler-clock-hour-4 mr-1 size-3.5"></i>
                    <span
                      x-text="$timeAgo(releaseTime)"
                      th:text="${#dates.format(moment.spec.releaseTime,'yyyy-MM-dd')}"
                    ></span>
                  </div>
                </div>
                <div
                  th:utext="${content.html}"
                  class="moment-content prose prose-base !max-w-none break-words dark:prose-invert prose-pre:p-0"
                ></div>
                <div
                  th:unless="${#lists.isEmpty(moment.spec.content.medium)}"
                  class="moment-media mt-4 grid w-full grid-cols-3 gap-3 sm:w-2/3"
                >
                  <div class="moment-media-item aspect-square" th:each="media : ${moment.spec.content.medium}">
                    <img
                      th:if="${#strings.equals(media.type,'PHOTO')}"
                      class="size-full object-cover"
                      th:src="${media.url}"
                      th:srcset="|${thumbnail.gen(media.url, 's')} 400w,
                                  ${thumbnail.gen(media.url, 'm')} 800w,
                                  ${thumbnail.gen(media.url, 'l')} 1200w|"
                      sizes="(max-width: 1200px) 100vw, 1200px"
                    />
                    <div
                      th:if="${#strings.equals(media.type,'VIDEO')}"
                      x-data="{openVideoModal:false}"
                      class="size-full"
                    >
                      <video th:src="${media.url}" class="size-full object-cover"></video>
                      <div
                        class="absolute inset-0 flex cursor-pointer items-center justify-center bg-gray-900/20 opacity-0 transition-all hover:opacity-100"
                        @click="openVideoModal = true"
                      >
                        <i class="i-tabler-player-play-filled !size-10 text-white"></i>
                      </div>
                      <template x-teleport="body">
                        <div>
                          <div
                            class="fixed inset-0 z-50 bg-gray-900/60 opacity-100 backdrop-blur-md"
                            aria-hidden="true"
                            x-show="openVideoModal"
                            x-cloak
                            x-transition:enter="ease-in-out duration-300"
                            x-transition:enter-start="opacity-0"
                            x-transition:enter-end="opacity-100"
                            x-transition:leave="ease-in-out duration-300"
                            x-transition:leave-start="opacity-100"
                            x-transition:leave-end="opacity-0"
                          ></div>
                          <div
                            class="fixed inset-0 z-50 overflow-y-auto"
                            tabindex="-1"
                            x-show="openVideoModal"
                            x-cloak
                            x-transition:enter="ease-out duration-200"
                            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                            x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                            x-transition:leave="ease-in duration-100"
                            x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                          >
                            <div class="flex min-h-full flex-col items-center justify-center p-4 text-center sm:p-0">
                              <div
                                @click.outside="openVideoModal = false"
                                class="relative my-4 transform overflow-hidden rounded-2xl bg-black shadow-2xl transition-all sm:w-full sm:max-w-2xl"
                              >
                                <video th:src="${media.url}" class="w-full" controls autoplay></video>
                              </div>
                              <button
                                @click="openVideoModal = false"
                                class="mt-4 flex size-10 items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md transition-all hover:bg-white/20"
                              >
                                <i class="i-tabler-x size-6"></i>
                              </button>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
                <div class="mt-4 flex items-center gap-2">
                  <div
                    class="moment-stats-btn"
                    :class="{'active-upvote': upvoted(name)}"
                    @click="handleUpvote(name)"
                  >
                    <i x-show="upvoted(name)" x-cloak class="i-tabler-heart-filled size-4"></i>
                    <i x-show="!upvoted(name)" x-cloak class="i-tabler-heart size-4"></i>
                    <span
                      class="ml-1.5 font-medium"
                      th:attr="data-upvote-moment-name=${moment.metadata.name}"
                      th:text="${moment.stats.upvote}"
                    >
                    </span>
                  </div>
                  <div
                    class="moment-stats-btn"
                    :class="{'active-comment': showComment}"
                    x-on:click="showComment = !showComment"
                  >
                    <i class="i-tabler-message-circle size-4"></i>
                    <span class="ml-1.5 font-medium" th:text="${moment.stats.approvedComment}"> </span>
                  </div>
                </div>

                <div class="mt-4 overflow-hidden rounded-xl bg-gray-50/50 dark:bg-slate-900/50" x-show="showComment" x-cloak x-transition>
                  <div class="p-4">
                    <halo:comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}" />
                  </div>
                </div>
              </div>
            </li>
          </ul>
        </div>

        <th:block
          th:replace="~{modules/pagination :: pagination(context = '/moments/', prevUrl = ${moments.prevUrl}, nextUrl = ${moments.nextUrl}, totalPages = ${moments.totalPages}, page = ${moments.page}, hasPrevious = ${moments.hasPrevious()}, hasNext = ${moments.hasNext()})}"
        />
      </div>
    </div>
    <th:block th:replace="~{modules/sidebar :: sidebar(prepend = null)}" />
  </section>
</include>
